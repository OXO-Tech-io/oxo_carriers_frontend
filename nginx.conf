server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Next.js static export uses trailingSlash: true.
    # try_files first matches the literal path, then directory (which serves
    # /<path>/index.html), then falls back to root index for SPA-style routing.
    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    # Cache Next.js static asset bundles aggressively
    location /_next/static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Enable gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}
